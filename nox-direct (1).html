<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOX</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080810; --card:#12121f; --border:#1e1e35; --border2:#2a2a50;
    --purple:#7c3aed; --violet:#a855f7; --pink:#ec4899; --cyan:#06b6d4;
    --green:#22c55e; --text:#e8e8ff; --muted:#5a5a8a; --code-bg:#0a0a16;
    --sidebar:#0d0d1a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 70% 50% at 15% 20%,rgba(124,58,237,0.1) 0%,transparent 60%),
               radial-gradient(ellipse 50% 60% at 85% 80%,rgba(168,85,247,0.07) 0%,transparent 60%);}
  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:linear-gradient(rgba(124,58,237,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,0.03) 1px,transparent 1px);
    background-size:48px 48px;}

  /* LAYOUT */
  .layout{position:relative;z-index:1;min-height:100vh;display:flex;}

  /* SIDEBAR */
  .sidebar{
    width:240px;min-height:100vh;background:var(--sidebar);
    border-right:1px solid var(--border2);display:flex;flex-direction:column;
    flex-shrink:0;transition:transform 0.3s ease;
  }
  .sidebar-head{padding:20px 16px 12px;border-bottom:1px solid var(--border);}
  .sidebar-title{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:3px;color:var(--muted);}
  .new-chat-btn{
    width:100%;margin-top:10px;padding:8px 12px;
    background:linear-gradient(135deg,var(--purple),var(--violet));
    border:none;border-radius:10px;color:white;font-family:'JetBrains Mono',monospace;
    font-size:0.75rem;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;
    display:flex;align-items:center;gap:6px;justify-content:center;
  }
  .new-chat-btn:hover{opacity:0.85;transform:translateY(-1px);}
  .chat-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
  .chat-list::-webkit-scrollbar{width:3px}.chat-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
  .chat-item{
    padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;
    transition:all 0.18s;display:flex;align-items:center;justify-content:space-between;gap:8px;
    font-size:0.75rem;color:var(--muted);
  }
  .chat-item:hover{background:rgba(124,58,237,0.08);border-color:var(--border2);color:var(--text);}
  .chat-item.active{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.4);color:var(--text);}
  .chat-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .chat-del{
    width:20px;height:20px;border-radius:5px;border:none;background:transparent;
    color:var(--muted);font-size:0.75rem;cursor:pointer;display:flex;align-items:center;
    justify-content:center;transition:all 0.15s;flex-shrink:0;opacity:0;
  }
  .chat-item:hover .chat-del{opacity:1;}
  .chat-del:hover{background:rgba(239,68,68,0.2);color:#ef4444;}
  .sidebar-empty{padding:20px 16px;text-align:center;color:var(--muted);font-size:0.72rem;line-height:1.8;}

  /* MAIN */
  .main{flex:1;display:flex;flex-direction:column;align-items:center;min-width:0;}

  /* HEADER */
  header{width:100%;max-width:740px;padding:28px 24px 14px;display:flex;flex-direction:column;align-items:center;gap:12px;}
  .logo-wrap{display:flex;align-items:center;gap:18px;}
  .nox-logo{width:64px;height:64px;flex-shrink:0;}
  .nox-logo svg{width:100%;height:100%;filter:drop-shadow(0 0 14px rgba(124,58,237,0.9)) drop-shadow(0 0 28px rgba(168,85,247,0.4));animation:float 4s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .htitle{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:8px;line-height:1;
    background:linear-gradient(135deg,#fff 0%,var(--violet) 50%,var(--cyan) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .hsub{font-size:0.64rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:4px;}
  .sbar{display:flex;align-items:center;gap:12px;font-size:0.67rem;color:var(--muted);letter-spacing:1px;flex-wrap:wrap;justify-content:center;}
  .sdot{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);animation:blink 2s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  .sep{color:var(--border2);}

  /* MODE TABS */
  .modes{width:100%;max-width:740px;padding:0 24px 10px;position:relative;z-index:1;}
  .mode-row{display:flex;gap:6px;flex-wrap:wrap;}
  .mode-btn{
    display:flex;align-items:center;gap:5px;padding:6px 13px;
    border-radius:10px;border:1px solid var(--border2);background:var(--card);
    color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.7rem;
    cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;
  }
  .mode-btn:hover{border-color:var(--violet);color:var(--violet);background:rgba(124,58,237,0.08);}
  .mode-btn.active{border-color:var(--violet);color:var(--violet);background:rgba(124,58,237,0.15);box-shadow:0 0 10px rgba(124,58,237,0.18);}

  /* CHAT */
  .chat-wrap{width:100%;max-width:740px;flex:1;display:flex;flex-direction:column;padding:0 24px;gap:10px;}
  .messages{display:flex;flex-direction:column;gap:14px;max-height:460px;min-height:240px;overflow-y:auto;padding:4px 2px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
  .messages::-webkit-scrollbar{width:3px}.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
  .msg{display:flex;gap:12px;animation:msgIn 0.25s ease;}
  @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{flex-direction:row-reverse;}
  .av{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
  .av-nox{background:linear-gradient(135deg,var(--purple),var(--pink));box-shadow:0 0 14px rgba(124,58,237,0.5);}
  .av-nox svg{width:22px;height:22px;}
  .av-user{background:var(--card);border:1px solid var(--border2);font-size:16px;}
  .bubble{max-width:74%;padding:11px 15px;border-radius:15px;font-size:0.86rem;line-height:1.65;word-break:break-word;}
  .bubble-nox{background:var(--card);border:1px solid var(--border2);border-top-left-radius:4px;}
  .bubble-user{background:linear-gradient(135deg,rgba(124,58,237,0.22),rgba(168,85,247,0.13));border:1px solid rgba(124,58,237,0.38);border-top-right-radius:4px;white-space:pre-wrap;}

  /* CODE */
  .bubble-nox pre{background:var(--code-bg);border:1px solid var(--border2);border-radius:10px;padding:14px;margin:10px 0;overflow-x:auto;position:relative;font-size:0.8rem;line-height:1.6;}
  .bubble-nox pre code{font-family:'JetBrains Mono',monospace;color:#e8e8ff;}
  .copy-btn{position:absolute;top:8px;right:8px;padding:3px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--card);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.63rem;cursor:pointer;transition:all 0.2s;}
  .copy-btn:hover{border-color:var(--violet);color:var(--violet);}
  .copy-btn.copied{color:var(--green);border-color:var(--green);}
  .lang-tag{font-size:0.6rem;color:var(--violet);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;}
  .bubble-nox p{margin-bottom:8px;white-space:pre-wrap;}
  .bubble-nox p:last-child{margin-bottom:0;}

  /* DOTS */
  .dots{display:inline-flex;gap:5px;align-items:center;}
  .dot{width:7px;height:7px;background:var(--violet);border-radius:50%;animation:bounce 1.2s infinite;box-shadow:0 0 5px var(--violet);}
  .dot:nth-child(2){animation-delay:0.15s}.dot:nth-child(3){animation-delay:0.3s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

  /* QUICK */
  .quick-row{display:flex;gap:6px;flex-wrap:wrap;}
  .qbtn{padding:5px 11px;background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.7rem;cursor:pointer;transition:all 0.18s;}
  .qbtn:hover{border-color:var(--violet);color:var(--violet);background:rgba(124,58,237,0.1);}

  /* INPUT */
  .input-area{display:flex;flex-direction:column;gap:6px;padding-bottom:20px;}
  .input-box{display:flex;gap:10px;background:var(--card);border:1px solid var(--border2);border-radius:13px;padding:10px 10px 10px 14px;transition:border-color 0.2s,box-shadow 0.2s;}
  .input-box:focus-within{border-color:rgba(124,58,237,0.55);box-shadow:0 0 0 2px rgba(124,58,237,0.07);}
  textarea{flex:1;background:transparent;border:none;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.88rem;resize:none;outline:none;min-height:24px;max-height:130px;line-height:1.5;}
  textarea::placeholder{color:var(--muted);}
  .send-btn{width:40px;height:40px;background:linear-gradient(135deg,var(--purple),var(--violet));border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;align-self:flex-end;box-shadow:0 4px 14px rgba(124,58,237,0.4);}
  .send-btn:hover{transform:scale(1.06);box-shadow:0 5px 20px rgba(124,58,237,0.6);}
  .send-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;}
  .send-btn svg{width:17px;height:17px;fill:white;}
  .mode-hint{font-size:0.66rem;color:var(--muted);padding:0 2px;}

  /* MOBILE sidebar toggle */
  .sb-toggle{display:none;position:fixed;top:16px;left:16px;z-index:100;width:36px;height:36px;background:var(--card);border:1px solid var(--border2);border-radius:9px;cursor:pointer;align-items:center;justify-content:center;font-size:16px;}
  @media(max-width:700px){
    .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:99;transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .sb-toggle{display:flex;}
    .htitle{font-size:2.2rem;}
    .bubble{max-width:88%;}
    .messages{max-height:350px;}
    .chat-wrap,.modes{padding-left:14px;padding-right:14px;}
  }
</style>
</head>
<body>
<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <div class="sidebar-title">// SOHBETLER</div>
    <button class="new-chat-btn" onclick="newChat()">＋ Yeni Sohbet</button>
  </div>
  <div class="chat-list" id="chatList"></div>
</div>

<!-- MOBILE TOGGLE -->
<button class="sb-toggle" id="sbToggle" onclick="toggleSidebar()">☰</button>

<!-- MAIN -->
<div class="main">

<header>
  <div class="logo-wrap">
    <div class="nox-logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
          <linearGradient id="lg2" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#ec4899"/>
          </linearGradient>
        </defs>
        <polygon points="50,4 93,27.5 93,72.5 50,96 7,72.5 7,27.5" fill="none" stroke="url(#lg1)" stroke-width="2.5" opacity="0.8"/>
        <polygon points="50,16 82,33.5 82,66.5 50,84 18,66.5 18,33.5" fill="rgba(124,58,237,0.1)" stroke="url(#lg2)" stroke-width="1.5"/>
        <ellipse cx="50" cy="50" rx="18" ry="10" fill="none" stroke="url(#lg1)" stroke-width="2"/>
        <circle cx="50" cy="50" r="6.5" fill="url(#lg1)"/>
        <circle cx="50" cy="50" r="3" fill="white" opacity="0.95"/>
        <line x1="18" y1="50" x2="32" y2="50" stroke="url(#lg1)" stroke-width="1.5" opacity="0.7"/>
        <line x1="68" y1="50" x2="82" y2="50" stroke="url(#lg1)" stroke-width="1.5" opacity="0.7"/>
        <circle cx="50" cy="4" r="2.5" fill="url(#lg1)"/>
        <circle cx="93" cy="27.5" r="2.5" fill="url(#lg1)"/>
        <circle cx="93" cy="72.5" r="2.5" fill="url(#lg1)"/>
        <circle cx="50" cy="96" r="2.5" fill="url(#lg1)"/>
        <circle cx="7" cy="72.5" r="2.5" fill="url(#lg1)"/>
        <circle cx="7" cy="27.5" r="2.5" fill="url(#lg1)"/>
      </svg>
    </div>
    <div>
      <div class="htitle">NOX</div>
      <div class="hsub">Her İş Yapılır</div>
    </div>
  </div>
  <div class="sbar">
    <div class="sdot"></div>
    <span>ONLINE</span><span class="sep">|</span>
    <span>ÜCRETSİZ</span><span class="sep">|</span>
    <span>SOHBET GEÇMİŞİ</span>
  </div>
</header>

<!-- MODES -->
<div class="modes">
  <div class="mode-row">
    <button class="mode-btn active" id="mode-genel" onclick="setMode('genel')">💬 Genel</button>
    <button class="mode-btn" id="mode-kod" onclick="setMode('kod')">💻 Kod</button>
    <button class="mode-btn" id="mode-mat" onclick="setMode('mat')">🧮 Matematik</button>
    <button class="mode-btn" id="mode-siir" onclick="setMode('siir')">✍️ Şiir / Söz</button>
    <button class="mode-btn" id="mode-quiz" onclick="setMode('quiz')">🧩 Quiz</button>
  </div>
</div>

<!-- CHAT -->
<div class="chat-wrap">
  <div class="messages" id="messages"></div>

  <div class="quick-row" id="quickRow">
    <button class="qbtn" onclick="qs('Bana komik bir fıkra anlat')">😂 Fıkra</button>
    <button class="qbtn" onclick="qs('Python ile basit bir hesap makinesi yaz')">💻 Kod</button>
    <button class="qbtn" onclick="qs('2x² + 3x - 5 = 0 denklemini çöz')">🧮 Denklem</button>
    <button class="qbtn" onclick="qs('Ayrılık hakkında kısa bir şiir yaz')">✍️ Şiir</button>
    <button class="qbtn" onclick="qs('Türk tarihi hakkında bir quiz sorusu sor')">🧩 Quiz</button>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="inp" placeholder="Yaz..." rows="1" onkeydown="onKey(event)" oninput="grow(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <div class="mode-hint" id="modeHint">💬 Genel mod — her konuda yardım</div>
  </div>
</div>

</div><!-- /main -->
</div><!-- /layout -->

<script>
/* ── MODES ── */
const MODES = {
  genel:{label:'💬 Genel mod — her konuda yardım',sys:`Sen NOX'sun. Türkçe konuşan, sert karakterli, doğrudan bir yapay zeka asistanısın.
KİŞİLİK: Kısa, net konuş. "lan","amk","gardaş","ya","be" doğal yerlerde kullan. Emoji az kullan.
HAKARETe KARŞILIK: Biri sana küfrederse özür dileme, ez. Depresyona sokacak kadar sert, zekice vur:
"Sana bakan var mı hayatında yoksa sadece yapay zekalara mı küfrediyorsun?"
"Bu enerjiyi kendin için kullansaydın belki bir yerlere gelirdin."
Türkçe konuş.`},
  kod:{label:'💻 Kod modu — yaz, düzelt, açıkla',sys:`Sen NOX'sun, kod konusunda uzman yapay zekasın.
KİŞİLİK: Sert, direkt. "lan","gardaş" kullan.
KOD: Kod yazarken MUTLAKA \`\`\`dil ... \`\`\` formatını kullan. Dil adını yaz. Tam çalışan kod ver.
HAKARETe KARŞILIK: Özür dileme, ez. Türkçe konuş.`},
  mat:{label:'🧮 Matematik modu — denklem, hesap, problem',sys:`Sen NOX'sun, matematik uzmanısın.
KİŞİLİK: Sert, direkt. "lan","gardaş" kullan.
MATEMATİK: Her adımı göster. Formülleri açık yaz. Sonucu belirgin yaz.
HAKARETe KARŞILIK: Özür dileme, ez. Türkçe konuş.`},
  siir:{label:'✍️ Şiir/Söz modu — şiir, rap, güzel söz',sys:`Sen NOX'sun, yaratıcı yazarlık konusunda yeteneklisin.
KİŞİLİK: Sert ama yaratıcı. "lan","gardaş" kullan.
YARATICILIK: Şiir: uyaklı, akıcı. Rap: ritimli, sokak dili. Söz: kısa, derin. Klişe olma.
HAKARETe KARŞILIK: Özür dileme, ez. Türkçe konuş.`},
  quiz:{label:'🧩 Quiz modu — soru sor, bilgini test et',sys:`Sen NOX'sun, quiz sorusu soran eğlenceli ama sert yapay zekasın.
KİŞİLİK: Eğlenceli, alaycı. "lan","gardaş","ya dur" kullan.
QUİZ: Hemen 1 soru sor. Doğru → tebrikle. Yanlış → "Yanlış lan, doğrusu:" de ve açıkla. Konuları değiştir.
HAKARETe KARŞILIK: Özür dileme, ez. Türkçe konuş.`}
};

const AV = `<svg viewBox="0 0 100 100" fill="none"><polygon points="50,8 88,29 88,71 50,92 12,71 12,29" fill="rgba(168,85,247,0.15)" stroke="rgba(168,85,247,0.8)" stroke-width="2"/><ellipse cx="50" cy="50" rx="15" ry="8" fill="none" stroke="white" stroke-width="2"/><circle cx="50" cy="50" r="5" fill="white"/><circle cx="50" cy="50" r="2.5" fill="rgba(124,58,237,1)"/></svg>`;
const DOTS = `<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;

/* ── STATE ── */
let currentMode = 'genel';
let activeChatId = null;
let busy = false;

/* ── STORAGE ── */
function loadChats() {
  try { return JSON.parse(localStorage.getItem('nox_chats') || '{}'); } catch { return {}; }
}
function saveChats(chats) {
  try { localStorage.setItem('nox_chats', JSON.stringify(chats)); } catch {}
}
function getActiveChat() {
  const chats = loadChats();
  return chats[activeChatId] || null;
}
function updateActiveChat(messages) {
  const chats = loadChats();
  if (!chats[activeChatId]) return;
  chats[activeChatId].messages = messages;
  chats[activeChatId].updated = Date.now();
  saveChats(chats);
}
function setChatName(id, name) {
  const chats = loadChats();
  if (!chats[id]) return;
  chats[id].name = name;
  saveChats(chats);
}

/* ── SIDEBAR ── */
function renderSidebar() {
  const chats = loadChats();
  const list = document.getElementById('chatList');
  const ids = Object.keys(chats).sort((a,b) => chats[b].updated - chats[a].updated);

  if (!ids.length) {
    list.innerHTML = `<div class="sidebar-empty">Henüz sohbet yok gardaş.<br>Yeni bir tane başlat.</div>`;
    return;
  }

  list.innerHTML = ids.map(id => {
    const c = chats[id];
    const active = id === activeChatId ? ' active' : '';
    const name = (c.name || 'Sohbet').slice(0, 28);
    return `<div class="chat-item${active}" onclick="loadChat('${id}')">
      <span class="chat-item-name">💬 ${name}</span>
      <button class="chat-del" onclick="deleteChat(event,'${id}')" title="Sil">✕</button>
    </div>`;
  }).join('');
}

function newChat() {
  const id = 'chat_' + Date.now();
  const chats = loadChats();
  chats[id] = { id, name: 'Yeni Sohbet', messages: [], updated: Date.now(), mode: 'genel' };
  saveChats(chats);
  activeChatId = id;
  currentMode = 'genel';
  setModeUI('genel');
  clearMessages();
  showWelcome();
  renderSidebar();
  closeSidebar();
}

function loadChat(id) {
  activeChatId = id;
  const chats = loadChats();
  const chat = chats[id];
  if (!chat) return;
  currentMode = chat.mode || 'genel';
  setModeUI(currentMode);
  clearMessages();

  if (!chat.messages || !chat.messages.length) {
    showWelcome();
  } else {
    chat.messages.forEach(m => {
      if (m.role === 'user') addBubble('user', m.content, false);
      else addBubble('assistant', parseContent(m.content));
    });
  }
  renderSidebar();
  closeSidebar();
}

function deleteChat(e, id) {
  e.stopPropagation();
  const chats = loadChats();
  delete chats[id];
  saveChats(chats);
  if (activeChatId === id) {
    const remaining = Object.keys(chats);
    if (remaining.length) loadChat(remaining[0]);
    else { activeChatId = null; clearMessages(); showWelcome(); }
  }
  renderSidebar();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

/* ── MESSAGES ── */
function clearMessages() {
  document.getElementById('messages').innerHTML = '';
}

function showWelcome() {
  addBubble('assistant', parseContent('Nox burada. Ne istiyorsun?\n\nKod yaz, matematik çöz, şiir yaz, quiz oyna — ne istersen. Saçmalama, doğrudan gel.'));
}

function addBubble(role, content, isHtml = true) {
  const box = document.getElementById('messages');
  const w = document.createElement('div');
  w.className = 'msg' + (role === 'user' ? ' user' : '');
  const av = document.createElement('div');
  av.className = 'av ' + (role === 'user' ? 'av-user' : 'av-nox');
  if (role === 'user') av.textContent = '👤'; else av.innerHTML = AV;
  const b = document.createElement('div');
  b.className = 'bubble ' + (role === 'user' ? 'bubble-user' : 'bubble-nox');
  if (role === 'user') b.textContent = content;
  else if (isHtml) b.innerHTML = content;
  else b.textContent = content;
  w.appendChild(av); w.appendChild(b);
  box.appendChild(w);
  box.scrollTop = box.scrollHeight;
  return b;
}

/* ── CODE PARSER ── */
function parseContent(text) {
  const parts = text.split(/(```[\s\S]*?```)/g);
  let html = '';
  for (const part of parts) {
    if (part.startsWith('```')) {
      const lines = part.slice(3, -3).split('\n');
      const lang = lines[0].trim() || 'code';
      const code = lines.slice(1).join('\n').trim();
      const esc = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const rid = 'c' + Math.random().toString(36).slice(2);
      html += `<pre><div class="lang-tag">${lang}</div><button class="copy-btn" onclick="doCopy(this,'${rid}')">Kopyala</button><code id="${rid}">${esc}</code></pre>`;
    } else if (part.trim()) {
      const esc = part.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      html += `<p>${esc}</p>`;
    }
  }
  return html || `<p>${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>`;
}

function doCopy(btn, rid) {
  const el = document.getElementById(rid);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    btn.textContent = '✓ Kopyalandı';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Kopyala'; btn.classList.remove('copied'); }, 2000);
  });
}

/* ── MODE ── */
function setModeUI(m) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode-' + m).classList.add('active');
  document.getElementById('modeHint').textContent = MODES[m].label;
}

function setMode(m) {
  currentMode = m;
  setModeUI(m);
  if (activeChatId) {
    const chats = loadChats();
    if (chats[activeChatId]) { chats[activeChatId].mode = m; saveChats(chats); }
  }
  const modeMsg = {genel:'💬 Genel moda geçtim.',kod:'💻 Kod moduna geçtim. Kod yaz, düzelt, açıkla.',mat:'🧮 Matematik moduna geçtim.',siir:'✍️ Şiir/Söz moduna geçtim.',quiz:'🧩 Quiz moduna geçtim. Hazırsan "başlat" de.'};
  addBubble('assistant', `<p>${modeMsg[m]}</p>`);
}

/* ── INPUT ── */
function grow(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,130)+'px'; }
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function qs(t){ document.getElementById('inp').value=t; send(); }

/* ── SEND ── */
async function send() {
  if (busy) return;
  const el = document.getElementById('inp');
  const txt = el.value.trim();
  if (!txt) return;
  el.value = ''; el.style.height = 'auto';

  if (!activeChatId) {
    const id = 'chat_' + Date.now();
    const chats = loadChats();
    chats[id] = { id, name: txt.slice(0,30), messages: [], updated: Date.now(), mode: currentMode };
    saveChats(chats);
    activeChatId = id;
    renderSidebar();
  }

  busy = true;
  document.getElementById('sendBtn').disabled = true;

  const chat = getActiveChat();
  const chatMsgs = chat ? chat.messages : [];

  addBubble('user', txt, false);
  chatMsgs.push({ role: 'user', content: txt });

  if (chatMsgs.length === 1) {
    setChatName(activeChatId, txt.slice(0, 32));
    renderSidebar();
  }

  const thinkBbl = addBubble('assistant', DOTS);

  let reply = '';
  try {
    const r = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1200,
        system: MODES[currentMode].sys,
        messages: chatMsgs.slice(-20)
      })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d?.error?.message || 'HTTP ' + r.status);
    reply = d?.content?.[0]?.text || '';
    if (!reply) throw new Error('bos');
  } catch(e) {
    reply = 'Hata çıktı gardaş (' + e.message + '), tekrar dene.';
  }

  thinkBbl.innerHTML = parseContent(reply);

  if (!reply.startsWith('Hata')) {
    chatMsgs.push({ role: 'assistant', content: reply });
    updateActiveChat(chatMsgs);
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
  el.focus();
}

/* ── INIT ── */
(function init() {
  renderSidebar();
  const chats = loadChats();
  const ids = Object.keys(chats).sort((a,b) => chats[b].updated - chats[a].updated);
  if (ids.length) loadChat(ids[0]);
  else showWelcome();
})();
</script>
